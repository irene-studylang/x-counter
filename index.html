<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Post Counter</title>
    <!-- Favicon: Inline SVG of stacked post icon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2210%22 y=%2225%22 width=%2260%22 height=%2260%22 rx=%2212%22 fill=%22%231DA1F2%22 opacity=%220.4%22/><rect x=%2230%22 y=%2215%22 width=%2260%22 height=%2260%22 rx=%2212%22 fill=%22%231DA1F2%22/><path d=%22M50 35v20M40 45h20%22 stroke=%22white%22 stroke-width=%228%22 stroke-linecap=%22round%22/></svg>">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.2s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, size = 18, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const calculateXLength = (text) => {
            if (!text) return 0;
            const urlRegex = /https?:\/\/[^\s]+/g;
            let weightedLength = 0;
            const textWithoutUrls = text.replace(urlRegex, () => {
                weightedLength += 46; // 23 * 2
                return "";
            });
            for (let i = 0; i < textWithoutUrls.length; i++) {
                const codePoint = textWithoutUrls.charCodeAt(i);
                weightedLength += (codePoint <= 4351) ? 1 : 2;
            }
            return weightedLength;
        };

        const App = () => {
            const [posts, setPosts] = useState([{ id: Date.now(), text: '' }]);
            const [copiedId, setCopiedId] = useState(null);
            const MAX_WEIGHT = 280;

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            const addPost = () => setPosts([...posts, { id: Date.now(), text: '' }]);
            const removePost = (id) => posts.length > 1 && setPosts(posts.filter(p => p.id !== id));
            const updatePost = (id, newText) => setPosts(posts.map(p => p.id === id ? { ...p, text: newText } : p));

            const copyToClipboard = (id, text) => {
                if (!text) return;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopiedId(id);
                setTimeout(() => setCopiedId(null), 2000);
            };

            const getStatus = () => {
                const hasContent = posts.some(p => p.text.length > 0);
                if (!hasContent) return null;

                const overLimit = posts.some(p => calculateXLength(p.text) > MAX_WEIGHT);
                const hasEmpty = posts.some(p => p.text.trim().length === 0);

                if (overLimit) return { label: '文字数超過', color: 'bg-red-100 text-red-700', icon: 'alert-circle' };
                if (hasEmpty) return { label: '未入力あり', color: 'bg-amber-100 text-amber-700', icon: 'help-circle' };
                return { label: '投稿可能', color: 'bg-green-100 text-green-700', icon: 'check-circle' };
            };

            const status = getStatus();
            const allPostsValid = status?.label === '投稿可能';

            return (
                <div className="max-w-full mx-auto p-2 sm:p-4 text-slate-800">
                    <div className="flex items-center justify-between mb-4 px-1">
                        <div className="flex items-center gap-2">
                            <Icon name="twitter" className="text-[#1DA1F2]" />
                            <h1 className="font-bold text-lg text-slate-700">X Tree Counter</h1>
                        </div>
                        {status && (
                            <div className={`text-[10px] font-bold px-2 py-1 rounded-full flex items-center gap-1 transition-all ${status.color}`}>
                                <Icon name={status.icon} size={10} />
                                {status.label}
                            </div>
                        )}
                    </div>

                    <div className="space-y-4">
                        {posts.map((post, index) => {
                            const length = calculateXLength(post.text);
                            const isOver = length > MAX_WEIGHT;
                            const isCopied = copiedId === post.id;
                            
                            return (
                                <div key={post.id} className="relative group">
                                    {index < posts.length - 1 && (
                                        <div className="absolute left-5 top-10 bottom-[-20px] w-0.5 bg-slate-100"></div>
                                    )}
                                    <div className={`bg-white rounded-lg border shadow-sm transition-all duration-200 ${isOver ? 'border-red-400 bg-red-50/30' : 'border-slate-200 shadow-slate-200/50'}`}>
                                        <div className="p-3">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-[10px] font-bold text-slate-400 uppercase">Post {index + 1}</span>
                                                <div className="flex items-center gap-2">
                                                    <span className={`text-xs font-mono font-bold mr-1 ${isOver ? 'text-red-500' : 'text-slate-500'}`}>{length}/280</span>
                                                    
                                                    <div className="relative flex items-center">
                                                        {isCopied && (
                                                            <span className="absolute right-full mr-2 px-2 py-0.5 bg-green-500 text-white text-[9px] font-bold rounded animate-fade-in-up whitespace-nowrap">
                                                                コピー完了！
                                                            </span>
                                                        )}
                                                        <button 
                                                            onClick={() => copyToClipboard(post.id, post.text)} 
                                                            className={`p-1.5 rounded transition-all flex items-center justify-center ${isCopied ? 'bg-green-100 text-green-600 scale-110' : 'text-slate-400 hover:bg-slate-100 hover:text-blue-500'}`}
                                                            title="コピー"
                                                        >
                                                            {isCopied ? <Icon name="check" size={14} /> : <Icon name="copy" size={14} />}
                                                        </button>
                                                    </div>

                                                    {posts.length > 1 && (
                                                        <button onClick={() => removePost(post.id)} className="p-1.5 hover:bg-red-100 rounded text-slate-400 hover:text-red-500 transition-colors" title="削除">
                                                            <Icon name="trash-2" size={14} />
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                            <textarea
                                                className={`w-full text-sm p-2 rounded border-none focus:ring-1 focus:outline-none resize-none h-24 transition-colors ${isOver ? 'bg-red-50/50 focus:ring-red-400' : 'bg-slate-50 focus:ring-blue-400'}`}
                                                placeholder="いまどうしてる？"
                                                value={post.text}
                                                onChange={(e) => updatePost(post.id, e.target.value)}
                                            />
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="mt-4 space-y-3">
                        <button onClick={addPost} className="w-full py-2 border border-dashed border-slate-300 rounded-lg text-xs text-slate-500 hover:bg-white hover:border-slate-400 transition-all flex items-center justify-center gap-2">
                            <Icon name="plus" size={14} /> ツリーを追加
                        </button>
                        
                        <button 
                            disabled={!allPostsValid}
                            onClick={() => window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(posts[0].text)}`, '_blank')}
                            className={`w-full py-3 rounded-full font-bold text-sm flex items-center justify-center gap-2 shadow-md transition-all ${allPostsValid ? 'bg-[#1DA1F2] text-white hover:bg-[#1a8cd8] active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none'}`}
                        >
                            <Icon name="twitter" size={16} /> 投稿画面を開く
                        </button>
                        
                        {!allPostsValid && posts.some(p => p.text.length > 0) && (
                            <p className="text-[10px] text-center text-slate-400 px-2 leading-tight">
                                {posts.some(p => calculateXLength(p.text) > MAX_WEIGHT) ? "文字数を減らしてください" : "空のポストを削除または入力してください"}
                            </p>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
